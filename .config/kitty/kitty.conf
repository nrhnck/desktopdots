# ──────────────────────────────
#   FONT
# ──────────────────────────────

font_family      JetBrainsMono Nerd Font
italic_font      JetBrainsMono Nerd Font Italic
bold_font        JetBrainsMono Nerd Font Bold
bold_italic_font JetBrainsMono Nerd Font Bold Italic
font_size 14

adjust_line_height 4
adjust_column_width 1
disable_ligatures never

# ──────────────────────────────
#   WINDOW BEHAVIOR
# ──────────────────────────────

window_padding_width 14
enable_audio_bell no
remember_window_size no
placement_strategy center
hide_window_decorations titlebar-only

# ──────────────────────────────
#   PERFORMANCE
# ──────────────────────────────

repaint_delay 10
input_delay   1
sync_to_monitor yes

# ──────────────────────────────
#   SCROLLBACK
# ──────────────────────────────

scrollback_lines 5000
scrollback_pager_history_size 64

# ──────────────────────────────
#   KEYBINDINGS
# ──────────────────────────────

map ctrl+shift+enter new_tab
map ctrl+shift+left  previous_tab
map ctrl+shift+right next_tab
map ctrl+shift+w     close_tab

# ──────────────────────────────
#   COLORS — Koda Palette Dark Monochrome
# ──────────────────────────────

foreground            #a6a6a6
background            #080808
background_opacity    0.98

selection_foreground  #c4c4c4
selection_background  #1a1a1a

cursor                #c4c4c4
cursor_text_color     #080808

url_color             #8a8a8a
active_border_color   #1a1a1a
inactive_border_color #121212

# ───────── ANSI

# black / base
color0   #000000
color8   #3d3d3d

# red / danger
color1   #4a4a4a
color9   #686868

# green
color2   #5c5c5c
color10  #a6a6a6

# yellow / warning
color3   #666666
color11  #b0b0b0

# blue / highlight
color4   #707070
color12  #b8b8b8

# magenta / pink
color5   #7a7a7a
color13  #d0d0d0

# cyan
color6   #848484
color14  #c0c0c0

# white / fg
color7   #a6a6a6
color15  #e0e0e0

window_border_width 0
cursor_shape block
cursor_blink_interval 0.8
shell_integration enabled
